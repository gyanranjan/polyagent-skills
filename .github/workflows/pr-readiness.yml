name: PR Readiness

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          for f in scripts/*.sh; do
            bash -n "$f"
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install markdown-it-py coverage

      - name: Python tests with coverage
        run: |
          coverage run --source=scripts -m unittest discover -s tests -v
          coverage report --include="scripts/*.py" --fail-under=70

      - name: Mermaid preflight (non-blocking by design)
        run: ./scripts/check-mermaid.sh

      - name: Design readiness structure check
        run: |
          ./scripts/design-readiness-check.sh --allow-open \
            skills/requirement-study/references/requirement-template.md \
            docs/specs/SPEC_TEMPLATE.md

      - name: Agent TODO sync dry-run
        run: |
          cp agent.todo.md /tmp/agent.todo.md
          ./scripts/sync-agent-todo.sh /tmp/agent.todo.md \
            skills/requirement-study/references/requirement-template.md \
            docs/specs/SPEC_TEMPLATE.md
