name: Bug Report
description: Skill doesn't work correctly with an agent
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Agent
      options:
        - Claude Code
        - OpenAI Codex
        - AWS Kiro
        - Google Gemini
        - Cursor
        - Other
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill
      placeholder: e.g., requirement-study
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
